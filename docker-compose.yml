services:

  sqlserver:

    image: mcr.microsoft.com/mssql/server:2022-latest

    container_name: pet_db

    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "PetShop123@"
      MSSQL_MEMORY_LIMIT_MB: 1024

    ports:
      - "1433:1433"

    volumes:
      - sqlserver_data:/var/opt/mssql

volumes:
  sqlserver_data: