<h1>Editar Animal</h1>


<form (ngSubmit)="atualizarAnimal()">


<h3>Animal</h3>


<p>
Nome:
<input 
[(ngModel)]="nome"
name="nome">
</p>


<p>
Idade:
<input 
type="number"
[(ngModel)]="idade"
name="idade">
</p>


<p>
Peso:
<input
type="number"
[(ngModel)]="peso"
name="peso">
</p>


<p>
Data de nascimento:

<input
type="date"
[(ngModel)]="dataNascimento"
name="dataNascimento">

</p>


<p>
Espécie:

<input
[(ngModel)]="especie"
name="especie">

</p>



<h3>Tutor</h3>


<p>
Nome do tutor:

<input
[(ngModel)]="nomeTutor"
name="nomeTutor">

</p>


<p>
CPF:

<input
[(ngModel)]="cpf"
name="cpf">

</p>



<h3>Endereço</h3>


<p>
CEP:

<input
[(ngModel)]="cep"
name="cep">

</p>


<p>
Logradouro:

<input
[(ngModel)]="logradouro"
name="logradouro">

</p>


<p>
Número:

<input
type="number"
[(ngModel)]="numero"
name="numero">

</p>


<p>
Bairro:

<input
[(ngModel)]="bairro"
name="bairro">

</p>


<p>
Cidade:

<input
[(ngModel)]="cidade"
name="cidade">

</p>


<p>
UF:

<input
[(ngModel)]="uf"
name="uf">

</p>



<button type="submit">
Salvar alterações
</button>


<button 
type="button"
(click)="cancelar()">

Cancelar

</button>


</form>
