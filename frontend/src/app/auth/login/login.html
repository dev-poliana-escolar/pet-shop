<h1>Login</h1>

<form (ngSubmit)="entrar()">

  <p>
    Email
  </p>

  <input
    type="email"
    name="email"
    [(ngModel)]="email">

  <p>
    Senha
  </p>

  <input
    type="password"
    name="senha"
    [(ngModel)]="senha">

  <br><br>

  <button type="submit">
    Entrar
  </button>

</form>

<br>

<a routerLink="/register">
  Cadastrar
</a>
